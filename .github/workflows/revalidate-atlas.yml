name: Revalidate Atlas Content

# Checks the source repo for new commits and triggers portal revalidation.
# Keeps everything in atlas-portal — no changes needed on sky-ecosystem/next-gen-atlas.

on:
  schedule:
    # Every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Manual trigger from Actions tab

jobs:
  check-and-revalidate:
    runs-on: ubuntu-latest

    steps:
      - name: Check source repo for changes
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the latest commit SHA from the source repo's Atlas file
          LATEST_SHA=$(gh api repos/sky-ecosystem/next-gen-atlas/commits \
            --jq '.[0].sha' \
            -q 'path=Sky Atlas/Sky Atlas.md&per_page=1')

          echo "latest_sha=$LATEST_SHA" >> $GITHUB_OUTPUT

          # Compare against the last known SHA (stored as a repo variable)
          LAST_SHA="${{ vars.LAST_ATLAS_SHA }}"
          echo "last_sha=$LAST_SHA"

          if [ "$LATEST_SHA" = "$LAST_SHA" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected (SHA: $LATEST_SHA)"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected: $LAST_SHA -> $LATEST_SHA"
          fi

      - name: Trigger revalidation
        if: steps.check.outputs.changed == 'true'
        env:
          PORTAL_URL: ${{ vars.PORTAL_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${PORTAL_URL}/api/revalidate?secret=${REVALIDATE_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{"path": "/atlas"}')

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -1)

          echo "Response ($http_code): $body"

          if [ "$http_code" != "200" ]; then
            echo "::error::Revalidation failed with HTTP $http_code"
            exit 1
          fi

      - name: Update last known SHA
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh variable set LAST_ATLAS_SHA \
            --body "${{ steps.check.outputs.latest_sha }}" \
            --repo ${{ github.repository }}
